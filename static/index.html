<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Image Classifier</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <h1>Image Classifier</h1>
    <p>Upload an image, use the camera, or draw something. The model will try to classify it using ImageNet categories.</p>

    <div>
      <button id="uploadModeButton" type="button">Upload</button>
      <button id="cameraModeButton" type="button">Camera</button>
      <button id="drawModeButton" type="button">Draw</button>
    </div>

    <div id="uploadPanel">
      <p><input id="uploadInput" type="file" accept="image/*"></p>
      <img id="preview" alt="Selected image preview">
    </div>

    <div id="cameraPanel" hidden>
      <p>
        <button id="startCameraButton" type="button">Start Camera</button>
        <button id="captureButton" type="button" disabled>Capture Frame</button>
        <button id="stopCameraButton" type="button" disabled>Stop Camera</button>
      </p>
      <video id="cameraVideo" autoplay playsinline></video>
    </div>

    <div id="drawPanel" hidden>
      <p>
        <button id="clearDrawingButton" type="button">Clear Drawing</button>
      </p>
      <canvas id="drawCanvas" width="320" height="320"></canvas>
      <p>Drawings may be less accurate because the model was trained mostly on photos.</p>
    </div>

    <p>
      <button id="predictButton" type="button" disabled>Classify</button>
    </p>

    <div>
      <p>Prediction: <strong id="labelResult">?</strong></p>
      <p id="confidenceResult">Confidence: -</p>
      <h2>Related results</h2>
      <div id="probabilityList"></div>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
